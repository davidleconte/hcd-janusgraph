openapi: 3.0.3
info:
  title: Banking Domain API
  description: |
    REST API for banking analytics, AML detection, fraud detection, and compliance.
    
    This API provides endpoints for:
    - AML structuring detection and sanctions screening
    - Fraud ring detection and scoring
    - UBO (Ultimate Beneficial Owner) discovery
    - Compliance audit logging and reporting
    
    ## Authentication
    All endpoints require authentication using JWT tokens.
    Include the token in the `Authorization` header:
    ```
    Authorization: Bearer <token>
    ```
    
    ## Rate Limiting
    - 100 requests per minute per API key
    - 1000 requests per hour per API key
    Rate limit headers are included in responses:
    - `X-RateLimit-Limit`: Maximum requests per window
    - `X-RateLimit-Remaining`: Remaining requests in current window
    - `X-RateLimit-Reset`: Unix timestamp when the window resets
    
    ## Error Handling
    All errors follow RFC 7807 Problem Details format:
    ```json
    {
      "error": "ERROR_CODE",
      "detail": "Human-readable message",
      "status_code": 400,
      "timestamp": "2026-03-24T12:00:00Z"
    }
    ```
    
    ## Regulatory Compliance
    This API supports compliance with:
    - **BSA/AML**: Bank Secrecy Act and Anti-Money Laundering
    - **FATF**: Financial Action Task Force Recommendations
    - **EU 5AMLD**: 5th Anti-Money Laundering Directive
    - **FinCEN CDD Rule**: Customer Due Diligence requirements
    - **GDPR**: General Data Protection Regulation
    
  version: 1.0.0
  contact:
    name: Banking API Support
    email: banking-api@example.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: https://api.example.com/api/v1
    description: Production server
  - url: https://staging-api.example.com/api/v1
    description: Staging server
  - url: http://localhost:8000/api/v1
    description: Local development server

tags:
  - name: AML Detection
    description: Anti-Money Laundering detection endpoints
  - name: Fraud Detection
    description: Fraud detection and analysis endpoints
  - name: UBO Discovery
    description: Ultimate Beneficial Owner discovery endpoints
  - name: Compliance
    description: Compliance audit and reporting endpoints

security:
  - bearerAuth: []

paths:
  # ============================================================
  # AML ENDPOINTS
  # ============================================================
  
  /aml/structuring:
    post:
      tags:
        - AML Detection
      summary: Detect structuring patterns
      description: |
        Identifies accounts with multiple transactions just below reporting thresholds
        that may indicate attempts to evade Currency Transaction Reports (CTRs).
        
        **Pattern Types Detected:**
        - `potential_structuring`: Multiple transactions below $10,000 threshold
        - `rapid_succession`: High-frequency transactions in short time windows
        - `layering`: Multi-hop transaction chains through multiple accounts
        
        **Regulatory Reference:** 31 CFR 1010.311 - Currency Transaction Reports
      operationId: detectStructuring
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StructuringDetectionRequest'
            examples:
              default_scan:
                summary: Default 7-day scan
                value:
                  time_window_days: 7
                  threshold_amount: 10000.0
                  min_transaction_count: 3
              account_specific:
                summary: Specific account analysis
                value:
                  account_id: ACC-12345-XYZ
                  time_window_days: 30
                  threshold_amount: 10000.0
                  min_transaction_count: 5
      responses:
        '200':
          description: Structuring analysis completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuringDetectionResponse'
              example:
                alerts:
                  - account_id: ACC-12345-XYZ
                    account_holder: John Doe
                    total_amount: 47500.00
                    transaction_count: 5
                    time_window: 7 days
                    risk_score: 85.5
                    pattern_type: potential_structuring
                total_alerts: 1
                analysis_period: "2026-03-17 to 2026-03-24"
                query_time_ms: 125.45
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
        '429':
          description: Rate limit exceeded

  /aml/sanctions/screen:
    post:
      tags:
        - AML Detection
      summary: Screen against sanctions lists
      description: |
        Screens names against multiple sanctions lists using fuzzy matching algorithms.
        
        **Supported Lists:**
        - OFAC SDN (Office of Foreign Assets Control - Specially Designated Nationals)
        - UN Consolidated List
        - EU Consolidated Financial Sanctions List
        
        **Matching Algorithms:**
        - Exact match
        - Fuzzy match (Levenshtein distance)
        - Phonetic match (Soundex, Metaphone)
      operationId: screenSanctions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SanctionsScreeningRequest'
            example:
              names:
                - "John Smith"
                - "Ahmed Al-Rashid"
                - "Maria Garcia"
              lists:
                - ofac
                - un
                - eu
              fuzzy_threshold: 0.85
      responses:
        '200':
          description: Screening completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SanctionsScreeningResponse'
        '400':
          description: Invalid request
        '401':
          description: Authentication required

  # ============================================================
  # FRAUD ENDPOINTS
  # ============================================================
  
  /fraud/rings:
    get:
      tags:
        - Fraud Detection
      summary: Detect fraud rings
      description: |
        Detects potential fraud rings based on shared identifiers (addresses, phone numbers)
        and transaction patterns.
        
        **Detection Criteria:**
        - Multiple accounts sharing the same address or phone
        - Coordinated transaction timing
        - Circular fund flows between accounts
      operationId: detectFraudRings
      parameters:
        - name: min_members
          in: query
          schema:
            type: integer
            minimum: 2
            maximum: 10
            default: 3
          description: Minimum number of members to consider a ring
        - name: include_accounts
          in: query
          schema:
            type: boolean
            default: true
          description: Include account details in response
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Number of items to skip
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
          description: Maximum items to return
      responses:
        '200':
          description: Fraud ring detection completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FraudRingsResponse'
              example:
                rings:
                  - ring_id: RING-001
                    member_count: 5
                    shared_identifiers:
                      - type: address
                        value: "123 Main St, City"
                    accounts:
                      - ACC-001
                      - ACC-002
                      - ACC-003
                total_detected: 1
                offset: 0
                limit: 50
        '401':
          description: Authentication required

  /fraud/score:
    post:
      tags:
        - Fraud Detection
      summary: Calculate fraud score
      description: |
        Calculates a comprehensive fraud score based on multiple risk indicators.
        
        **Score Components:**
        - Velocity Score (30%): Transaction frequency and amount patterns
        - Network Score (25%): Relationship-based risk assessment
        - Merchant Score (25%): Merchant risk and category analysis
        - Behavioral Score (20%): Deviation from normal behavior
      operationId: calculateFraudScore
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FraudScoreRequest'
      responses:
        '200':
          description: Fraud score calculated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FraudScoreResponse'
        '400':
          description: Invalid request
        '401':
          description: Authentication required

  # ============================================================
  # UBO ENDPOINTS
  # ============================================================
  
  /ubo/discover:
    post:
      tags:
        - UBO Discovery
      summary: Discover Ultimate Beneficial Owners
      description: |
        Traverses ownership chains through direct ownership and holding companies
        to identify individuals with significant control.
        
        **Default Threshold:** 25% ownership (EU 5AMLD / FATF standard)
        
        **Regulatory References:**
        - EU 5AMLD Article 3(6)
        - FATF Recommendation 24
        - FinCEN CDD Rule 31 CFR 1010.230
      operationId: discoverUBO
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UBORequest'
            example:
              company_id: COMP-12345-XYZ
              include_indirect: true
              max_depth: 10
              ownership_threshold: 25.0
      responses:
        '200':
          description: UBO discovery completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UBOResponse'
              example:
                target_entity_id: COMP-12345-XYZ
                target_entity_name: Acme Holdings Ltd
                ubos:
                  - person_id: PERS-001
                    name: John Smith
                    ownership_percentage: 35.5
                    ownership_type: direct
                    chain_length: 1
                  - person_id: PERS-002
                    name: Jane Doe
                    ownership_percentage: 28.0
                    ownership_type: indirect
                    chain_length: 3
                total_layers: 3
                high_risk_indicators: []
                risk_score: 0.0
                query_time_ms: 234.56
        '404':
          description: Company not found
        '401':
          description: Authentication required

  /ubo/network/{company_id}:
    get:
      tags:
        - UBO Discovery
      summary: Get ownership network
      description: |
        Returns the ownership network around a company for visualization.
        Includes nodes (companies, persons) and edges (ownership relationships).
      operationId: getOwnershipNetwork
      parameters:
        - name: company_id
          in: path
          required: true
          schema:
            type: string
          description: Company ID to analyze
        - name: depth
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 5
            default: 3
          description: Traversal depth for network
      responses:
        '200':
          description: Ownership network retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworkResponse'
        '404':
          description: Company not found
        '401':
          description: Authentication required

  # ============================================================
  # COMPLIANCE ENDPOINTS
  # ============================================================
  
  /compliance/audit/log:
    post:
      tags:
        - Compliance
      summary: Log audit event
      description: |
        Logs a compliance audit event for regulatory tracking.
        
        **Supported Event Types:**
        - `data_access`: Data query or retrieval
        - `data_modification`: Create, update, or delete operations
        - `auth_login`: User authentication
        - `auth_logout`: User logout
        - `auth_failed`: Failed authentication attempt
        - `gdpr_data_request`: GDPR data access request
        - `gdpr_deletion_request`: GDPR deletion request
        - `sar_filing`: Suspicious Activity Report filing
        - `ctr_filing`: Currency Transaction Report filing
      operationId: logAuditEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuditEventRequest'
      responses:
        '201':
          description: Audit event logged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEventResponse'
        '400':
          description: Invalid event data
        '401':
          description: Authentication required

  /compliance/reports/generate:
    post:
      tags:
        - Compliance
      summary: Generate compliance report
      description: |
        Generates regulatory compliance reports.
        
        **Supported Report Types:**
        - `gdpr_article_30`: GDPR Records of Processing Activities
        - `soc2_type_ii`: SOC 2 Type II Access Control Report
        - `bsa_aml`: Bank Secrecy Act / AML Report
        - `pci_dss`: PCI DSS Audit Report
      operationId: generateComplianceReport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComplianceReportRequest'
      responses:
        '200':
          description: Report generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceReportResponse'
        '400':
          description: Invalid request
        '401':
          description: Authentication required

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /auth/login endpoint

  schemas:
    # ============================================================
    # ERROR RESPONSES
    # ============================================================
    
    ErrorResponse:
      type: object
      required:
        - error
        - detail
        - status_code
        - timestamp
      properties:
        error:
          type: string
          description: Error code
          example: INVALID_REQUEST
        detail:
          type: string
          description: Human-readable error message
          example: Missing required field: account_id
        status_code:
          type: integer
          description: HTTP status code
          example: 400
        timestamp:
          type: string
          format: date-time
          description: Error timestamp
          example: "2026-03-24T12:00:00Z"

    # ============================================================
    # AML SCHEMAS
    # ============================================================
    
    StructuringDetectionRequest:
      type: object
      properties:
        account_id:
          type: string
          minLength: 5
          maxLength: 50
          pattern: '^[A-Z0-9\-_]+$'
          description: Specific account to analyze (optional, analyzes all if omitted)
          example: ACC-12345-XYZ
        time_window_days:
          type: integer
          minimum: 1
          maximum: 90
          default: 7
          description: Number of days to analyze
        threshold_amount:
          type: number
          format: float
          minimum: 0.01
          maximum: 1000000000
          default: 10000.0
          description: CTR threshold amount (default: $10,000)
        min_transaction_count:
          type: integer
          minimum: 1
          maximum: 1000
          default: 3
          description: Minimum transactions to flag
        offset:
          type: integer
          minimum: 0
          default: 0
          description: Number of items to skip
        limit:
          type: integer
          minimum: 1
          maximum: 500
          default: 50
          description: Maximum items to return

    StructuringAlert:
      type: object
      properties:
        account_id:
          type: string
          description: Account identifier
        account_holder:
          type: string
          description: Account holder name
        total_amount:
          type: number
          format: float
          description: Total transaction amount
        transaction_count:
          type: integer
          description: Number of transactions
        time_window:
          type: string
          description: Analysis time window
        risk_score:
          type: number
          format: float
          minimum: 0
          maximum: 100
          description: Risk score (0-100)
        pattern_type:
          type: string
          enum:
            - potential_structuring
            - rapid_succession
            - layering
          description: Detected pattern type

    StructuringDetectionResponse:
      type: object
      properties:
        alerts:
          type: array
          items:
            $ref: '#/components/schemas/StructuringAlert'
        total_alerts:
          type: integer
          description: Total number of alerts
        analysis_period:
          type: string
          description: Date range analyzed
        query_time_ms:
          type: number
          format: float
          description: Query execution time in milliseconds

    SanctionsScreeningRequest:
      type: object
      required:
        - names
      properties:
        names:
          type: array
          items:
            type: string
          minItems: 1
          maxItems: 1000
          description: Names to screen
        lists:
          type: array
          items:
            type: string
            enum:
              - ofac
              - un
              - eu
          default:
            - ofac
            - un
            - eu
          description: Sanctions lists to screen against
        fuzzy_threshold:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
          default: 0.85
          description: Fuzzy match threshold (0.0-1.0)

    SanctionsScreeningResponse:
      type: object
      properties:
        results:
          type: array
          items:
            type: object
            properties:
              input_name:
                type: string
              matches:
                type: array
                items:
                  type: object
                  properties:
                    list:
                      type: string
                    matched_name:
                      type: string
                    match_score:
                      type: number
                      format: float
                    match_type:
                      type: string
                      enum:
                        - exact
                        - fuzzy
                        - phonetic
        total_screened:
          type: integer
        total_matches:
          type: integer
        query_time_ms:
          type: number
          format: float

    # ============================================================
    # FRAUD SCHEMAS
    # ============================================================
    
    FraudRingsResponse:
      type: object
      properties:
        rings:
          type: array
          items:
            type: object
            properties:
              ring_id:
                type: string
              member_count:
                type: integer
              shared_identifiers:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                      enum:
                        - address
                        - phone
                        - email
                        - device
                    value:
                      type: string
              accounts:
                type: array
                items:
                  type: string
              risk_score:
                type: number
                format: float
        total_detected:
          type: integer
        offset:
          type: integer
        limit:
          type: integer

    FraudScoreRequest:
      type: object
      required:
        - customer_id
      properties:
        customer_id:
          type: string
          description: Customer ID to analyze
        transaction_id:
          type: string
          description: Specific transaction to score
        include_historical:
          type: boolean
          default: true
          description: Include historical behavior analysis

    FraudScoreResponse:
      type: object
      properties:
        customer_id:
          type: string
        total_score:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
          description: Overall fraud score (0.0-1.0)
        score_components:
          type: object
          properties:
            velocity_score:
              type: number
              format: float
            network_score:
              type: number
              format: float
            merchant_score:
              type: number
              format: float
            behavioral_score:
              type: number
              format: float
        risk_level:
          type: string
          enum:
            - low
            - medium
            - high
            - critical
        indicators:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              description:
                type: string
              severity:
                type: string
        query_time_ms:
          type: number
          format: float

    # ============================================================
    # UBO SCHEMAS
    # ============================================================
    
    UBORequest:
      type: object
      required:
        - company_id
      properties:
        company_id:
          type: string
          minLength: 5
          maxLength: 50
          pattern: '^[A-Z0-9\-_]+$'
          description: Company ID to analyze
        include_indirect:
          type: boolean
          default: true
          description: Include indirect ownership
        max_depth:
          type: integer
          minimum: 1
          maximum: 20
          default: 10
          description: Maximum ownership chain depth
        ownership_threshold:
          type: number
          format: float
          minimum: 0
          maximum: 100
          default: 25.0
          description: Minimum ownership percentage (default: 25%)

    UBOOwner:
      type: object
      properties:
        person_id:
          type: string
          description: Person identifier
        name:
          type: string
          description: Full name
        ownership_percentage:
          type: number
          format: float
          description: Ownership percentage
        ownership_type:
          type: string
          enum:
            - direct
            - indirect
          description: Direct or indirect ownership
        chain_length:
          type: integer
          description: Number of hops in ownership chain

    UBOResponse:
      type: object
      properties:
        target_entity_id:
          type: string
          description: Analyzed company ID
        target_entity_name:
          type: string
          description: Company name
        ubos:
          type: array
          items:
            $ref: '#/components/schemas/UBOOwner'
          description: List of ultimate beneficial owners
        total_layers:
          type: integer
          description: Maximum ownership chain depth found
        high_risk_indicators:
          type: array
          items:
            type: string
          description: Risk indicators identified
        risk_score:
          type: number
          format: float
          minimum: 0
          maximum: 100
        query_time_ms:
          type: number
          format: float

    NetworkNode:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
          enum:
            - company
            - person
        name:
          type: string
        type:
          type: string

    NetworkEdge:
      type: object
      properties:
        source:
          type: string
        target:
          type: string
        label:
          type: string
          enum:
            - beneficial_owner
            - owned_by
            - owns
        weight:
          type: number
          format: float
          description: Ownership percentage

    NetworkResponse:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/NetworkNode'
        edges:
          type: array
          items:
            $ref: '#/components/schemas/NetworkEdge'
        center_entity:
          type: string
          description: Center entity ID for visualization

    # ============================================================
    # COMPLIANCE SCHEMAS
    # ============================================================
    
    AuditEventRequest:
      type: object
      required:
        - event_type
        - user
        - resource
        - action
      properties:
        event_type:
          type: string
          enum:
            - data_access
            - data_modification
            - auth_login
            - auth_logout
            - auth_failed
            - gdpr_data_request
            - gdpr_deletion_request
            - sar_filing
            - ctr_filing
          description: Type of audit event
        user:
          type: string
          description: User performing the action
        resource:
          type: string
          description: Resource being accessed
        action:
          type: string
          description: Action performed
        result:
          type: string
          enum:
            - success
            - failure
            - denied
          default: success
        severity:
          type: string
          enum:
            - info
            - warning
            - error
            - critical
          default: info
        metadata:
          type: object
          additionalProperties: true
          description: Additional event metadata

    AuditEventResponse:
      type: object
      properties:
        event_id:
          type: string
          description: Unique event identifier
        timestamp:
          type: string
          format: date-time
          description: Event timestamp
        logged:
          type: boolean
          description: Whether event was logged successfully

    ComplianceReportRequest:
      type: object
      required:
        - report_type
        - start_date
        - end_date
      properties:
        report_type:
          type: string
          enum:
            - gdpr_article_30
            - soc2_type_ii
            - bsa_aml
            - pci_dss
          description: Type of compliance report
        start_date:
          type: string
          format: date-time
          description: Report start date
        end_date:
          type: string
          format: date-time
          description: Report end date
        format:
          type: string
          enum:
            - json
            - csv
            - html
            - pdf
          default: json
          description: Output format
        include_details:
          type: boolean
          default: true
          description: Include detailed findings

    ComplianceReportResponse:
      type: object
      properties:
        report_id:
          type: string
        report_type:
          type: string
        generated_at:
          type: string
          format: date-time
        period:
          type: object
          properties:
            start_date:
              type: string
              format: date-time
            end_date:
              type: string
              format: date-time
        summary:
          type: object
          additionalProperties: true
        findings:
          type: array
          items:
            type: object
            properties:
              category:
                type: string
              severity:
                type: string
              description:
                type: string
              count:
                type: integer
        download_url:
          type: string
          description: URL to download report file
