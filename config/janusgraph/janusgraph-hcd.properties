# JanusGraph Configuration for HCD Backend
# Storage Backend: HCD (Cassandra-based)

gremlin.graph=org.janusgraph.core.JanusGraphFactory

# Backend configuration
storage.backend=cql
storage.hostname=hcd-server
storage.port=9042
storage.cql.keyspace=janusgraph

# Cassandra/HCD specific settings - Multi-DC Configuration
# NetworkTopologyStrategy enables multi-datacenter replication for:
# - GDPR compliance (data residency requirements)
# - Business continuity (disaster recovery)
# - Low-latency access (geo-distributed reads)
# - Regulatory compliance (data sovereignty)
storage.cql.replication-strategy-class=NetworkTopologyStrategy
storage.cql.replication-strategy-options=DC1:3,DC2:3,DC3:2
storage.cql.local-datacenter=DC1

# Multi-DC Read/Write Configuration
# LOCAL_QUORUM ensures consistency within datacenter while maintaining availability
storage.cql.read-consistency-level=LOCAL_QUORUM
storage.cql.write-consistency-level=LOCAL_QUORUM

# Cross-DC Replication Settings
# Enables asynchronous replication across datacenters
storage.cql.replication-factor=3

# Connection settings
storage.connection-timeout=60000
storage.setup-wait=60000

# Cache configuration
cache.db-cache=true
cache.db-cache-clean-wait=20
cache.db-cache-time=180000
cache.db-cache-size=0.25

# Index backend - Disabled for OpenSearch 3.x compatibility
# NOTE: JanusGraph 1.1.0 does NOT support OpenSearch 3.x (version check fails)
# OpenSearch 3.x is available for vector search via direct k-NN API calls
# See: https://github.com/JanusGraph/janusgraph/issues/4887

# Elasticsearch backend (disabled - not compatible with OpenSearch 3.x)
# index.search.backend=elasticsearch
# index.search.hostname=opensearch
# index.search.port=9200
# index.search.elasticsearch.interface=REST_CLIENT
# index.search.elasticsearch.bulk-refresh=true

# Local Lucene index for basic text search (enabled)
index.search.backend=lucene
index.search.directory=/var/lib/janusgraph/index

# Graph configuration
graph.graphname=janusgraph
graph.set-vertex-id=false
graph.allow-custom-vid-types=false

# Performance tuning
storage.batch-loading=false
storage.buffer-size=1024

# Query optimization
query.batch=true
query.force-index=false
query.smart-limit=false
